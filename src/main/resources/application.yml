spring:
  application:
    name: game-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/game-cellar}
  datasource:
    url: ${GAME_DB_URL}
    username: ${GAME_DB_USERNAME}
    password: ${GAME_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-disabled: true
    locations: classpath:db/migration

server:
  port: ${GAME_SERVICE_PORT:8081}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: false

logging:
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr([%X{requestId:-........}]){magenta} %clr([%-15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"

igdb:
  client-id: ${TWITCH_CLIENT_ID}
  client-secret: ${TWITCH_CLIENT_SECRET}
  connect-timeout: ${IGDB_CONNECT_TIMEOUT:2000}
  read-timeout: ${IGDB_READ_TIMEOUT:10000}
  api:
    base-url: ${IGDB_API_BASE_URL:https://api.igdb.com/v4}
  worker:
    enabled: ${IGDB_WORKER_ENABLED:true}
    discovery-limit: ${IGDB_WORKER_DISCOVERY_LIMIT:500}
    discovery-pages: ${IGDB_WORKER_DISCOVERY_PAGES:200}
    new-releases-pages: ${IGDB_WORKER_NEW_RELEASES_PAGES:10}
    cron: ${IGDB_WORKER_CRON:0 30 3 * * *}
    rate-limit-delay-ms: ${IGDB_WORKER_RATE_LIMIT_DELAY_MS:250}
